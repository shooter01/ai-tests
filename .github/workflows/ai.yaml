name: Qwen PR Diff Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  qwen-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR source branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Show PR refs
        env:
          BASE_REPO: ${{ github.event.pull_request.base.repo.full_name }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Base repo: $BASE_REPO"
          echo "Base ref:  $BASE_REF"
          echo "Head repo: $HEAD_REPO"
          echo "Head ref:  $HEAD_REF"
          echo "Head sha:  $HEAD_SHA"
          git log --oneline -5

      - name: Fetch PR target branch and create diff
        env:
          BASE_REPO: ${{ github.event.pull_request.base.repo.full_name }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -e

          git remote add base "https://github.com/${BASE_REPO}.git" || true
          git fetch --no-tags --prune base "+refs/heads/${BASE_REF}:refs/remotes/base/${BASE_REF}"

          echo "Merge base:"
          git merge-base "refs/remotes/base/${BASE_REF}" HEAD

          echo "Changed files:"
          git diff --name-status "refs/remotes/base/${BASE_REF}...HEAD" | tee changed-files.txt

          echo "Creating PR diff..."
          git diff \
            --find-renames \
            --find-copies \
            "refs/remotes/base/${BASE_REF}...HEAD" \
            > pr.diff

          echo "Diff size:"
          wc -c pr.diff
          echo "Diff preview:"
          sed -n '1,120p' pr.diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Qwen Code
        run: |
          npm install -g @qwen-code/qwen-code@latest
          qwen --version

      - name: Create Qwen settings
        run: |
          mkdir -p .qwen

          cat > .qwen/settings.json <<'EOF'
          {
            "modelProviders": {
              "openai": [
                {
                  "id": "gpt://b1g0fdc0s8egb0178g1n/qwen3-235b-a22b-fp8/latest",
                  "name": "Qwen3 235B (Yandex AI Studio)",
                  "envKey": "YANDEX_API_KEY",
                  "baseUrl": "https://llm.api.cloud.yandex.net/v1",
                  "generationConfig": {
                    "timeout": 120000,
                    "maxRetries": 2,
                    "contextWindowSize": 128000,
                    "samplingParams": {
                      "temperature": 0.3,
                      "max_tokens": 8192
                    }
                  }
                }
              ]
            },
            "$version": 3,
            "model": {
              "name": "gpt://b1g0fdc0s8egb0178g1n/qwen3-235b-a22b-fp8/latest"
            },
            "security": {
              "auth": {
                "selectedType": "openai"
              }
            }
          }
          EOF

      - name: Build Qwen prompt from PR diff
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          cat > qwen-prompt.md <<EOF
          Ты — строгий, но прагматичный code reviewer.

          Проверь изменения в Pull Request.

          PR: #${PR_NUMBER}
          Title: ${PR_TITLE}
          Base branch: ${BASE_REF}
          Head branch: ${HEAD_REF}

          Ниже дан diff текущей ветки PR относительно целевой ветки PR.
          Смотри именно на изменения из diff.

          Важно:
          - Не завышай риск без причины.
          - high ставь только если изменение ломает сборку, безопасность, данные пользователей, авторизацию, платежи, миграции или критический production-flow.
          - medium ставь для потенциальных багов, невалидного кода, спорной логики.
          - low ставь для косметики, документации, мелких правок.
          - Если файл выглядит тестовым или случайным, явно напиши это.

          Ответь по-русски в формате:

          ## Краткое резюме
          ...

          ## Найденные проблемы
          - severity: low / medium / high
            file: путь к файлу
            issue: описание проблемы
            recommendation: что исправить

          ## Что проверить тестами
          ...

          ## Итоговый риск
          low / medium / high

          Diff:
          EOF

          cat pr.diff >> qwen-prompt.md

      - name: Run Qwen Code on PR diff
        env:
          YANDEX_API_KEY: ${{ secrets.YANDEX_API_KEY }}
        run: |
          cat qwen-prompt.md | qwen --prompt
      - name: Run Qwen Code on PR diff
        env:
          YANDEX_API_KEY: ${{ secrets.YANDEX_API_KEY }}
        run: |
          cat qwen-prompt.md | qwen --prompt > qwen-review.md
          cat qwen-review.md

      - name: Post review comment to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" --body-file qwen-review.md